name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp/**"
      - "packages/sdk/**"
      - "packages/spec/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build MCP package
        run: pnpm --filter @lemmaoracle/mcp build

      - name: Deploy to Cloudflare Workers
        working-directory: ./packages/mcp
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
