name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [rebuild]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # Blog posts are fetched from a GitHub repo at build time; set Variables (and optional LEMMA_GH_TOKEN secret) in repo Settings → Secrets and variables → Actions.
      # Google Analytics ID should also be set as a Variable (PUBLIC_GOOGLE_ANALYTICS_ID).
      - name: Build web (Astro)
        env:
          LEMMA_POSTS_REPO: ${{ vars.LEMMA_POSTS_REPO }}
          LEMMA_POSTS_BRANCH: ${{ vars.LEMMA_POSTS_BRANCH || 'main' }}
          LEMMA_POSTS_PATH: ${{ vars.LEMMA_POSTS_PATH || '' }}
          LEMMA_GH_TOKEN: ${{ secrets.LEMMA_GH_TOKEN }}
          PUBLIC_GOOGLE_ANALYTICS_ID: ${{ vars.PUBLIC_GOOGLE_ANALYTICS_ID }}
        run: pnpm --filter @lemmaoracle/web build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
