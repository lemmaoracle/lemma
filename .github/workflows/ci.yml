name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Foundry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            packages/contracts/lib
          key: ${{ runner.os }}-foundry-${{ hashFiles('packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts dependencies
        working-directory: ./packages/contracts
        run: forge build

      - name: Run tests
        run: pnpm test

      - name: Display test summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- All tests executed via pnpm test" >> $GITHUB_STEP_SUMMARY
          echo "- Contracts tested with Forge" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript packages tested with Vitest" >> $GITHUB_STEP_SUMMARY
