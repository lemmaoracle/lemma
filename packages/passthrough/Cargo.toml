[package]
name = "lemma-passthrough"
version = "0.1.0"
edition = "2021"
authors = ["Lemma Oracle"]
description = "Passthrough schema for Lemma circuits - returns input unchanged"
license = "MIT"
repository = "https://github.com/lemmaoracle/lemma"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1