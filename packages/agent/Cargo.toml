[package]
name = "lemma-agent"
version = "0.1.0"
edition = "2021"
authors = ["Lemma Oracle"]
description = "Agent Identity + Authority Credential schema WASM for Lemma circuits"
license = "MIT"
repository = "https://github.com/lemmaoracle/lemma"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
