[profile.default]
src = "build"
out = "out"
libs = ["node_modules", "build/libs"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
  "forge-std/=build/libs/forge-std/src/"
]

[verify]
path = "build/PaymentVerifier.sol"

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
base_sepolia = "https://sepolia.base.org"

[etherscan]
monad_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 10143 }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }